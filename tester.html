    <link rel="stylesheet" href="style.css">

<body>

        </div>
        
        <div class="input-section">
            <input type="text" id="apiUrl" placeholder="Inserisci il link dell'API..." value="https://silver-cod-q7pp7qqj9wrvh44qw-8000.app.github.dev/api/test">
            <button id="fetchBtn">Chiama API</button>
        </div>

        <div class="output-section">
            <p class="output-label">Risposta JSON:</p>
            <pre id="jsonOutput" class="json-box">In attesa di chiamata...</pre>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
