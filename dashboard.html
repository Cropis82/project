<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesGO - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    
    <header class="top-header">
        <div class="header-left">
            <h1 class="logo-title">NotesGO</h1>
        </div>
        <div class="header-center">
            <input type="text" placeholder="Cerca gruppi pubblici..." class="search-bar public-search">
        </div>
        <div class="header-right">
            <span id="user-greeting" class="user-name">Caricamento...</span>
            <button id="settings-btn" class="icon-btn" title="Impostazioni">⚙️</button>
            <button id="logout-btn" class="icon-btn" title="Esci">🚪</button>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="main-header">
            <h2>I tuoi gruppi</h2>
            <input type="text" placeholder="Filtra i tuoi gruppi..." class="search-bar local-search">
        </div>
        
        <div id="groups-container" class="groups-list">
            </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
