<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotesGO - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-body">

    <header class="top-header">
        <div class="header-left">
            <h1 class="logo-title">NotesGO</h1>
        </div>
        <div class="header-center">
            <input type="text" placeholder="Cerca gruppi pubblici..." class="search-bar public-search">
        </div>
        <div class="header-right">
            <span id="user-greeting" class="user-name">Caricamento...</span>
            <button id="settings-btn" class="icon-btn" title="Impostazioni">⚙️</button>
            <button id="logout-btn" class="icon-btn" title="Esci">🚪</button>
        </div>
    </header>

    <main class="dashboard-main">
        <div class="main-header">
            <h2>I tuoi gruppi</h2>
            <button id="create-group-btn" class="small-btn">+ Crea Gruppo</button>
        </div>

        <div class="filter-section">
            <input type="text" id="local-search-input" placeholder="Filtra i tuoi gruppi..."
                class="search-bar local-search">
        </div>

        <div id="groups-container" class="groups-list">
        </div>
    </main>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Impostazioni</h2>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>

            <div class="modal-body">
                <div class="settings-section">
                    <h3>Tema dell'App</h3>
                    <p class="settings-desc">Scegli la combinazione di colori che preferisci.</p>

                    <div class="theme-grid">
                        <div class="theme-option" data-theme="default">
                            <div class="color-cube cube-default selected"></div>
                            <span>NotesGO</span>
                        </div>
                        <div class="theme-option" data-theme="dark">
                            <div class="color-cube cube-dark"></div>
                            <span>Dark Mode</span>
                        </div>
                        <div class="theme-option" data-theme="ocean">
                            <div class="color-cube cube-ocean"></div>
                            <span>Oceano</span>
                        </div>
                        <div class="theme-option" data-theme="forest">
                            <div class="color-cube cube-forest"></div>
                            <span>Foresta</span>
                        </div>
                        <div class="theme-option" data-theme="minimal">
                            <div class="color-cube cube-minimal"></div>
                            <span>Minimal</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="create-group-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nuovo Gruppo</h2>
                <button id="close-create-group" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="output-label">Nome Gruppo</label>
                    <input type="text" id="group-name" placeholder="Es. Progetto Reti">
                </div>

                <div class="input-group">
                    <label class="output-label">Descrizione</label>
                    <textarea id="group-desc" placeholder="Di cosa si occupa questo gruppo?" rows="3"></textarea>
                </div>

                <div class="input-group">
                    <label class="output-label">Accesso</label>
                    <select id="group-access" class="custom-select">
                        <option value="private">🔒 Privato (Solo su invito)</option>
                        <option value="public">🌍 Pubblico (Trovabile nella ricerca)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label class="output-label">Permessi di Scrittura</label>
                    <select id="group-permissions" class="custom-select">
                        <option value="all">Tutti i membri possono interagire</option>
                        <option value="owner">Solo l'amministratore (Sola lettura per gli altri)</option>
                    </select>
                </div>

                <button id="submit-create-group" style="width: 100%; margin-top: 15px;">Crea Ora</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
